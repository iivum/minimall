name: Docker Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code existence verification
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Verify build configuration
        run: |
          echo "=== Verifying Build Configuration ==="
          test -f backend/Dockerfile && echo "Backend Dockerfile exists"
          test -f docker-compose.yml && echo "Docker Compose file exists"

  # Build and push Docker image
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: verify-code
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build application
        run: mvn clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate build metrics
  metrics:
    name: Build Metrics
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    steps:
      - name: Calculate build size
        run: |
          echo "=== Build Metrics ==="
          if [ -f backend/target/*.jar ]; then
            JAR_SIZE=$(du -h backend/target/*.jar | cut -f1)
            echo "JAR file size: $JAR_SIZE"
          fi
          echo "Build completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
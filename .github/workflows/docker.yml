name: Docker Build and Push

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code existence verification
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          echo "Working directory: $(pwd)"
          if [ -d "$(pwd)/src/main/java" ]; then
            echo "Main source directory exists"
          else
            echo "ERROR: Main source directory NOT found"
            exit 1
          fi
          if [ -f "$(pwd)/pom.xml" ]; then
            echo "Maven configuration exists"
          else
            echo "ERROR: Maven configuration NOT found"
            exit 1
          fi
          if [ -f "$(pwd)/backend/Dockerfile" ]; then
            echo "Backend Dockerfile exists"
          else
            echo "ERROR: Dockerfile NOT found"
            exit 1
          fi

      - name: Verify build configuration
        run: |
          echo "=== Verifying Build Configuration ==="
          if [ -f "$(pwd)/backend/Dockerfile" ]; then
            echo "Backend Dockerfile exists"
          else
            echo "ERROR: Backend Dockerfile NOT found"
            exit 1
          fi
          if [ -f "$(pwd)/docker-compose.yml" ]; then
            echo "Docker Compose file exists"
          else
            echo "ERROR: Docker Compose file NOT found"
            exit 1
          fi

  # Build and push Docker image
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: verify-code
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build application
        run: mvn clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

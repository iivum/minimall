name: Deploy to Production

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment readiness
        run: |
          echo "=== Deployment Readiness Check ==="
          test -f docker-compose.yml && echo "Docker Compose file verified"
          test -f backend/Dockerfile && echo "Dockerfile verified"
          echo "Deployment ready"

      - name: Create deployment summary
        run: |
          echo "=== Deployment Summary ==="
          echo "Tag: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "To deploy, run on your server:"
          echo "  cd minimall && git pull && docker-compose up -d"

  # Code existence verification at deploy time
  verify-deploy:
    name: Verify Code for Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Final verification
        run: |
          echo "=== Final Code Existence Verification ==="
          test -d src/main/java && echo "Main source: OK"
          test -d src/test/java && echo "Test source: OK"
          test -f pom.xml && echo "Build config: OK"
          test -f backend/Dockerfile && echo "Dockerfile: OK"
          test -f docker-compose.yml && echo "Docker Compose: OK"
          echo ""
          echo "All required files exist - ready for deployment"
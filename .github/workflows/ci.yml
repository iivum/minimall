name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"
          test -f src/main/java/.gitkeep || test $(find src/main/java -name '*.java' 2>/dev/null | wc -l) -gt 0 && echo "Main source files exist"
          test -f src/test/java/.gitkeep || test $(find src/test/java -name '*.java' 2>/dev/null | wc -l) -gt 0 && echo "Test source files exist"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Check code coverage
        run: mvn jacoco:check -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Tech Debt Backlog Sync Verification (MIN-3169)
  tech-debt-sync:
    name: Tech Debt Backlog Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tech debt changes include backlog updates
        run: |
          echo "=== Tech Debt Backlog Sync Check ==="

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if any tech debt related files were changed
          TECH_DEBT_CHANGED=$(echo "$CHANGED_FILES" | grep -E "(tech-debt| Tech)" || true)

          if [ -n "$TECH_DEBT_CHANGED" ]; then
            echo "Tech debt related files changed:"
            echo "$TECH_DEBT_CHANGED"

            # Check if docs/tech-debt-backlog.md was updated when tech debt code was changed
            BACKLOG_UPDATED=$(echo "$CHANGED_FILES" | grep -E "docs/tech-debt-backlog" || true)
            CODE_CHANGED=$(echo "$CHANGED_FILES" | grep -E "\.(java|kt|js|ts)$" || true)

            if [ -n "$CODE_CHANGED" ] && [ -z "$BACKLOG_UPDATED" ]; then
              echo "ERROR: Code changes detected without tech-debt-backlog.md update"
              echo "When modifying tech debt items, you MUST update docs/tech-debt-backlog.md"
              echo "to mark the item as completed or in progress."
              exit 1
            fi

            # If backlog was updated, verify the format is correct
            if [ -n "$BACKLOG_UPDATED" ]; then
              echo "Backlog update detected - verifying format..."

              # Check that the update follows the claiming mechanism format
              # Look for Status change patterns
              BACKLOG_DIFF=$(git diff origin/main...HEAD -- docs/tech-debt-backlog.md)

              # Verify status values are valid
              INVALID_STATUS=$(echo "$BACKLOG_DIFF" | grep -E "Status.*:.*(Claimed|In progress|Completed|Not started)" -A1 | grep -v "^[-+]*Status" | grep -v "^-" | grep -E "^(?!.*(Claimed|In progress|Completed|Not started))" || true)
              if [ -n "$INVALID_STATUS" ]; then
                echo "Warning: Invalid status value detected"
              fi

              echo "Tech debt backlog sync verified successfully!"
            fi
          else
            echo "No tech debt related files changed - skipping sync check"
          fi

  # Verify deliverables (MIN-2400, MIN-2413)
  verify-deliverables:
    name: Verify Deliverables
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run deliverables verification
        run: |
          echo "=== 验证交付物 ==="
          # 使用 test -f 检查具体文件，不使用 test -d 作为唯一验证
          test -f pom.xml && echo "✓ pom.xml 存在"
          test -f backend/Dockerfile && echo "✓ backend/Dockerfile 存在"
          test -f src/main/java/.gitkeep || test $(find src/main/java -name '*.java' 2>/dev/null | wc -l) -gt 0 && echo "✓ Main source files exist"
          test -f src/test/java/.gitkeep || test $(find src/test/java -name '*.java' 2>/dev/null | wc -l) -gt 0 && echo "✓ Test source files exist"

      - name: Verify test files exist
        run: |
          echo "=== 检查测试文件 ==="
          TEST_FILES=$(find src/test/java -name '*Test.java' 2>/dev/null | wc -l)
          echo "测试文件数量: $TEST_FILES"
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "错误: 未找到测试文件"
            exit 1
          fi
          ./scripts/verify-deliverables.sh \
            src/test/java \
            target/surefire-reports

      - name: Verify deliverables script is executable
        run: |
          echo "=== 验证 verify-deliverables.sh ==="
          test -x scripts/verify-deliverables.sh && echo "验证脚本存在且可执行"
          ./scripts/verify-deliverables.sh pom.xml

      - name: Pre-review file existence verification (MIN-2635)
        run: |
          echo "=== Pre-review 文件存在性验证 ==="
          echo "检查关键交付物是否实际存在..."

          # 检查 pom.xml 是否存在
          if [ ! -f "pom.xml" ]; then
            echo "错误: pom.xml 不存在"
            exit 1
          fi
          echo "✓ pom.xml 存在"

          # 检查 Java 源码目录是否有实际文件
          JAVA_FILES=$(find src/main/java -name '*.java' 2>/dev/null | wc -l)
          if [ "$JAVA_FILES" -eq 0 ]; then
            echo "错误: 未找到任何 Java 源文件"
            exit 1
          fi
          echo "✓ 找到 $JAVA_FILES 个 Java 源文件"

          # 检查至少有一些测试文件
          TEST_FILES=$(find src/test/java -name '*Test.java' 2>/dev/null | wc -l)
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "错误: 未找到测试文件"
            exit 1
          else
            echo "✓ 找到 $TEST_FILES 个测试文件"
          fi

          # 检查关键目录存在性（仅作为辅助验证）
          test -d src/main/java && echo "✓ src/main/java 目录存在"
          test -d src/test/java && echo "✓ src/test/java 目录存在"

          echo ""
          echo "所有关键交付物已验证存在"

      - name: Generate verification report
        if: always()
        run: |
          REPORT_FILE="verification-report-$(date +%Y%m%d-%H%M%S).txt"
          echo "=== 交付物验证报告 ===" > $REPORT_FILE
          echo "生成时间: $(date)" >> $REPORT_FILE
          echo "仓库: $GITHUB_REPOSITORY" >> $REPORT_FILE
          echo "提交: $GITHUB_SHA" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试文件:" >> $REPORT_FILE
          find src/test/java -name '*Test.java' 2>/dev/null >> $REPORT_FILE || echo "无" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试报告:" >> $REPORT_FILE
          ls -la target/surefire-reports/*.txt 2>/dev/null | head -20 >> $REPORT_FILE || echo "无测试报告" >> $REPORT_FILE
          cat $REPORT_FILE

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report-*.txt
          retention-days: 30

  # Merge gate - prevents merge if checks fail (MIN-1545, MIN-2413)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, semgrep-sast, trivy-scan, gitleaks-scan, verify-deliverables, tech-debt-sync]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed."
          echo "This PR is cleared for merge."

  # Semgrep SAST scan
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
          output: semgrep.sarif
          upload: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Trivy vulnerability scan
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gitleaks secrets scan
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --exit-code 1'
          config: .gitleaks.toml

      - name: Upload Gitleaks results
        if: failure()
        run: |
          echo "Secrets detected! Gitleaks scan failed."
          exit 1
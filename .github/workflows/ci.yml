name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -d src/test/java && echo "Test source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Check code coverage
        run: mvn jacoco:check -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Verify deliverables (MIN-2400, MIN-2413, MIN-2882)
  verify-deliverables:
    name: Verify Deliverables
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify main branch existence (prevent fake main branch attacks)
        run: |
          echo "=== 验证 main 分支真实性 ==="
          # 检查 origin/main 是否存在
          git fetch origin main:refs/remotes/origin/main --depth=1 2>/dev/null || {
            echo "错误: origin/main 分支不存在"
            exit 1
          }
          echo "✓ origin/main 分支存在"

      - name: Verify deliverables script is executable
        run: |
          echo "=== 验证 verify-deliverables.sh ==="
          if [ ! -f "scripts/verify-deliverables.sh" ]; then
            echo "错误: scripts/verify-deliverables.sh 不存在"
            exit 1
          fi
          if [ ! -x "scripts/verify-deliverables.sh" ]; then
            echo "错误: scripts/verify-deliverables.sh 不可执行"
            exit 1
          fi
          echo "✓ verify-deliverables.sh 存在且可执行"

      - name: Pre-review file existence verification (strict - MIN-2635, MIN-2882)
        run: |
          echo "=== Pre-review 文件存在性验证 (严格模式) ==="

          # 1. 验证 pom.xml 存在且非空
          if [ ! -f "pom.xml" ]; then
            echo "错误: pom.xml 不存在"
            exit 1
          fi
          if [ ! -s "pom.xml" ]; then
            echo "错误: pom.xml 为空"
            exit 1
          fi
          echo "✓ pom.xml 存在且非空"

          # 2. 验证至少一个 Java 源文件存在且非空
          JAVA_FILES=$(find src/main/java -name '*.java' -type f 2>/dev/null)
          if [ -z "$JAVA_FILES" ]; then
            echo "错误: 未找到任何 Java 源文件"
            exit 1
          fi
          # 验证文件不为空
          for f in $JAVA_FILES; do
            if [ ! -s "$f" ]; then
              echo "错误: $f 为空"
              exit 1
            fi
          done
          JAVA_COUNT=$(echo "$JAVA_FILES" | wc -l)
          echo "✓ 找到 $JAVA_COUNT 个 Java 源文件，全部非空"

          # 3. 使用 verify-deliverables.sh 严格验证关键文件
          echo ""
          echo "=== 执行 verify-deliverables.sh 严格验证 ==="
          ./scripts/verify-deliverables.sh pom.xml
          if [ $? -ne 0 ]; then
            echo "错误: verify-deliverables.sh 验证失败"
            exit 1
          fi

          # 4. 验证测试文件存在且非空
          TEST_FILES=$(find src/test/java -name '*Test.java' -type f 2>/dev/null)
          if [ -z "$TEST_FILES" ]; then
            echo "错误: 未找到测试文件"
            exit 1
          fi
          for f in $TEST_FILES; do
            if [ ! -s "$f" ]; then
              echo "错误: 测试文件 $f 为空"
              exit 1
            fi
          done
          TEST_COUNT=$(echo "$TEST_FILES" | wc -l)
          echo "✓ 找到 $TEST_COUNT 个测试文件，全部非空"

          # 5. 验证构建产物存在（证明编译成功）
          echo ""
          echo "=== 验证构建产物 ==="
          if [ ! -d "target/classes" ]; then
            echo "错误: target/classes 目录不存在（编译可能失败）"
            exit 1
          fi
          CLASS_COUNT=$(find target/classes -name '*.class' 2>/dev/null | wc -l)
          if [ "$CLASS_COUNT" -eq 0 ]; then
            echo "错误: 未找到任何 .class 文件"
            exit 1
          fi
          echo "✓ 找到 $CLASS_COUNT 个 .class 文件"

          # 6. 验证测试报告存在（证明测试执行成功）
          if [ ! -d "target/surefire-reports" ]; then
            echo "错误: target/surefire-reports 目录不存在（测试未执行）"
            exit 1
          fi
          REPORT_COUNT=$(find target/surefire-reports -name '*.xml' 2>/dev/null | wc -l)
          if [ "$REPORT_COUNT" -eq 0 ]; then
            echo "错误: 未找到测试报告"
            exit 1
          fi
          echo "✓ 找到 $REPORT_COUNT 个测试报告"

          echo ""
          echo "所有关键交付物已严格验证存在"

      - name: Generate verification report
        if: always()
        run: |
          REPORT_FILE="verification-report-$(date +%Y%m%d-%H%M%S).txt"
          echo "=== 交付物验证报告 ===" > $REPORT_FILE
          echo "生成时间: $(date)" >> $REPORT_FILE
          echo "仓库: $GITHUB_REPOSITORY" >> $REPORT_FILE
          echo "提交: $GITHUB_SHA" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试文件:" >> $REPORT_FILE
          find src/test/java -name '*Test.java' 2>/dev/null >> $REPORT_FILE || echo "无" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试报告:" >> $REPORT_FILE
          ls -la target/surefire-reports/*.txt 2>/dev/null | head -20 >> $REPORT_FILE || echo "无测试报告" >> $REPORT_FILE
          cat $REPORT_FILE

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report-*.txt
          retention-days: 30

  # Merge gate - prevents merge if checks fail (MIN-1545, MIN-2413)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, semgrep-sast, trivy-scan, gitleaks-scan, verify-deliverables]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed."
          echo "This PR is cleared for merge."

  # Semgrep SAST scan
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
          output: semgrep.sarif
          upload: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Trivy vulnerability scan
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gitleaks secrets scan
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --exit-code 1'
          config: .gitleaks.toml

      - name: Upload Gitleaks results
        if: failure()
        run: |
          echo "Secrets detected! Gitleaks scan failed."
          exit 1
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -d src/test/java && echo "Test source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: |
          echo "=== Running SpotBugs Security Scan ==="
          if mvn spotbugs:check -B -q; then
            echo "✅ SpotBugs check passed"
          else
            echo "❌ SpotBugs found issues or not configured"
            exit 1
          fi

      - name: Run dependency check
        run: |
          echo "=== Running OWASP Dependency Check ==="
          if mvn dependency-check:check -B -q; then
            echo "✅ No known vulnerabilities found"
          else
            echo "❌ OWASP dependency check failed"
            exit 1
          fi

  # Feature implementation verification (MIN-1969)
  feature-verify:
    name: Verify Feature Implementation
    runs-on: ubuntu-latest
    needs: [merge-conflict-check, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR changes are on main
        run: |
          echo "=== Verifying PR Changes on Main Branch ==="
          # Get the base commit of the PR
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
            echo "PR from '$HEAD_REF' into '$BASE_REF'"

            # Fetch main branch
            git fetch origin $BASE_REF:$BASE_REF

            # Check if there are commits on this branch not on main
            COMMITS_AHEAD=$(git log --oneline $BASE_REF..HEAD --format="%H" | wc -l)
            echo "Commits ahead of $BASE_REF: $COMMITS_AHEAD"

            if [ "$COMMITS_AHEAD" -gt 0 ]; then
              echo "Branch has commits not yet merged to $BASE_REF"
              # Verify at least one of the changed files still exists
              CHANGED_FILES=$(git diff --name-only $BASE_REF..HEAD | head -10)
              echo "Changed files: $CHANGED_FILES"
            fi
          fi

      - name: Count changed files
        run: |
          echo "=== Changed Files Analysis ==="
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only origin/main...HEAD 2>/dev/null || echo "Cannot compare with origin/main"
          else
            git diff --name-only --staged 2>/dev/null || echo "No staged changes"
          fi

      - name: Verify implementation completeness
        run: |
          echo "=== Implementation Completeness Check ==="
          JAVA_FILES=$(find src -name '*.java' 2>/dev/null | wc -l)
          TEST_FILES=$(find src/test -name '*.java' 2>/dev/null | wc -l)
          echo "Java source files: $JAVA_FILES"
          echo "Test files: $TEST_FILES"

          if [ "$JAVA_FILES" -gt 0 ]; then
            echo "✅ Source code exists"
          else
            echo "❌ No source code found"
            exit 1
          fi

          # Warn if no tests
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "⚠️ Warning: No test files found"
          else
            echo "✅ Test files found"
          fi

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Merge gate - prevents merge if checks fail (MIN-1545, MIN-1969)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, feature-verify]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed:"
          echo "  ✅ Merge conflict check"
          echo "  ✅ Build and test"
          echo "  ✅ Security scan"
          echo "  ✅ Code quality"
          echo "  ✅ Feature implementation verification"
          echo ""
          echo "This PR is cleared for merge."
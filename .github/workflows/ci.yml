name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw -B verify

      - name: Checkstyle
        run: ./mvnw -B checkstyle:check

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  miniprogram:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniprogram

    steps:
      - uses: actions/checkout@v4

      - name: Check for tabnanny
        run: |
          if command -v tabnanny 2>/dev/null; then
            find . -name "*.py" -exec tabnanny {} \;
          else
            echo "tabnanny not available, skipping"
          fi

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -d src/test/java && echo "Test source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: JaCoCo Coverage Check
        run: mvn jacoco:check -B

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Merge gate - prevents merge if checks fail (MIN-1545)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, semgrep-sast, trivy-scan, gitleaks-scan]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed."
          echo "This PR is cleared for merge."

  # Semgrep SAST scan
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
          output: semgrep.sarif
          upload: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Trivy vulnerability scan
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gitleaks secrets scan
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --exit-code 1'
          config: .gitleaks.toml

      - name: Upload Gitleaks results
        if: failure()
        run: |
          echo "Secrets detected! Gitleaks scan failed."
          exit 1
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -d src/test/java && echo "Test source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Check code coverage
        run: mvn jacoco:check -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Verify deliverables (MIN-2400, MIN-2413)
  verify-deliverables:
    name: Verify Deliverables
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run deliverables verification
        run: |
          echo "=== 验证交付物 ==="
          test -d src/test/java && echo "Test directory exists"
          test -d src/main/java && echo "Main source directory exists"

      - name: Verify test files exist
        run: |
          echo "=== 检查测试文件 ==="
          TEST_FILES=$(find src/test/java -name '*Test.java' 2>/dev/null | wc -l)
          echo "测试文件数量: $TEST_FILES"
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "警告: 未找到测试文件"
          fi
          ./scripts/verify-deliverables.sh \
            src/test/java \
            target/surefire-reports

      - name: Verify deliverables script is executable
        run: |
          echo "=== 验证 verify-deliverables.sh ==="
          test -x scripts/verify-deliverables.sh && echo "验证脚本存在且可执行"
          ./scripts/verify-deliverables.sh pom.xml

      - name: Generate verification report
        if: always()
        run: |
          REPORT_FILE="verification-report-$(date +%Y%m%d-%H%M%S).txt"
          echo "=== 交付物验证报告 ===" > $REPORT_FILE
          echo "生成时间: $(date)" >> $REPORT_FILE
          echo "仓库: $GITHUB_REPOSITORY" >> $REPORT_FILE
          echo "提交: $GITHUB_SHA" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试文件:" >> $REPORT_FILE
          find src/test/java -name '*Test.java' 2>/dev/null >> $REPORT_FILE || echo "无" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试报告:" >> $REPORT_FILE
          ls -la target/surefire-reports/*.txt 2>/dev/null | head -20 >> $REPORT_FILE || echo "无测试报告" >> $REPORT_FILE
          cat $REPORT_FILE

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report-*.txt
          retention-days: 30

  # Pre-review gate - validates deliverables before agent marks in_review (MIN-2657)
  pre-review-gate:
    name: Pre-Review Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [verify-deliverables]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deliverables exist
        run: |
          echo "=== Pre-Review Gate: Deliverables Validation ==="
          echo "This gate ensures deliverables exist before reviewer is assigned."
          echo ""

          # List all modified/added files (objective evidence)
          echo "Changed files in this PR:"
          git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1...HEAD
          echo ""

          # Verify key deliverables exist (test -f)
          echo "=== Verifying key deliverables ==="
          FAILED=0

          # Source files
          for f in $(git diff --name-only origin/main...HEAD 2>/dev/null | grep -E '\.(java|xml|yml|yaml)$' | head -20); do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ $f (missing)"
              FAILED=$((FAILED + 1))
            fi
          done

          # Verify test files exist if Java files changed
          JAVA_CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep -c '\.java$' || echo "0")
          if [ "$JAVA_CHANGED" -gt 0 ]; then
            echo ""
            echo "=== Java files changed: $JAVA_CHANGED ==="
            TEST_DIR_COUNT=$(find src/test/java -type f -name '*Test.java' 2>/dev/null | wc -l)
            echo "Test files found: $TEST_DIR_COUNT"
            if [ "$TEST_DIR_COUNT" -eq 0 ]; then
              echo "❌ No test files found but Java source was modified"
              FAILED=$((FAILED + 1))
            else
              echo "✅ Test files exist"
            fi
          fi

          echo ""
          if [ $FAILED -gt 0 ]; then
            echo "❌ Pre-review gate FAILED: $FAILED deliverables missing"
            exit 1
          else
            echo "✅ Pre-review gate PASSED: All deliverables verified"
          fi

      - name: Generate pre-review evidence report
        run: |
          REPORT_FILE="pre-review-evidence-$(date +%Y%m%d-%H%M%S).txt"
          echo "=== Pre-Review Gate Evidence Report ===" > $REPORT_FILE
          echo "Generated: $(date)" >> $REPORT_FILE
          echo "Repository: $GITHUB_REPOSITORY" >> $REPORT_FILE
          echo "PR: $GITHUB_SHA" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "Files changed:" >> $REPORT_FILE
          git diff --name-only origin/main...HEAD 2>/dev/null | head -50 >> $REPORT_FILE || echo "Unable to list changed files" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "Deliverables verification:" >> $REPORT_FILE
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.yml" -o -name "*.yaml" \) -newer .git/index 2>/dev/null | head -30 >> $REPORT_FILE
          cat $REPORT_FILE

      - name: Upload pre-review evidence
        uses: actions/upload-artifact@v4
        with:
          name: pre-review-evidence
          path: pre-review-evidence-*.txt
          retention-days: 30

  # Merge gate - prevents merge if checks fail (MIN-1545, MIN-2413)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, semgrep-sast, trivy-scan, gitleaks-scan, verify-deliverables, pre-review-gate]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed."
          echo "This PR is cleared for merge."

  # Semgrep SAST scan
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
          output: semgrep.sarif
          upload: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Trivy vulnerability scan
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gitleaks secrets scan
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --exit-code 1'
          config: .gitleaks.toml

      - name: Upload Gitleaks results
        if: failure()
        run: |
          echo "Secrets detected! Gitleaks scan failed."
          exit 1
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Merge conflict detection (MIN-1545)
  merge-conflict-check:
    name: Detect Merge Conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflict markers
        run: |
          echo "=== Checking for Merge Conflict Markers ==="
          CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICT_FILES" ]; then
            echo "ERROR: Merge conflicts detected in the following files:"
            echo "$CONFLICT_FILES"
            echo ""
            echo "=== Conflict Details ==="
            git diff --diff-filter=U
            exit 1
          else
            echo "No merge conflict markers found"
          fi

      - name: Check for unmerged branches
        run: |
          echo "=== Checking Branch Status ==="
          git branch -a --merged origin/main | grep -v "^\*" || echo "All branches merged"

  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          test -d src/main/java && echo "Main source directory exists"
          test -d src/test/java && echo "Test source directory exists"
          test -f pom.xml && echo "Maven configuration exists"
          test -f backend/Dockerfile && echo "Dockerfile exists"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: merge-conflict-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Check code coverage
        run: mvn jacoco:check -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"

  # Verify deliverables (MIN-2400, MIN-2413, MIN-2680)
  verify-deliverables:
    name: Verify Deliverables
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch for comparison
        run: |
          echo "=== Fetching main branch for verification ==="
          git fetch origin main:refs/heads/main --depth=1

      - name: Run deliverables verification
        run: |
          echo "=== 验证交付物 ==="
          test -d src/test/java && echo "Test directory exists"
          test -d src/main/java && echo "Main source directory exists"

      - name: Verify test files exist
        run: |
          echo "=== 检查测试文件 ==="
          TEST_FILES=$(find src/test/java -name '*Test.java' 2>/dev/null | wc -l)
          echo "测试文件数量: $TEST_FILES"
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "警告: 未找到测试文件"
          fi
          ./scripts/verify-deliverables.sh \
            src/test/java \
            target/surefire-reports

      - name: Verify deliverables script is executable
        run: |
          echo "=== 验证 verify-deliverables.sh ==="
          test -x scripts/verify-deliverables.sh && echo "验证脚本存在且可执行"
          ./scripts/verify-deliverables.sh pom.xml

      - name: Verify files exist in main branch
        run: |
          echo "=== 检查文件在 main 分支的存在性 ==="
          INVALID_FILES=0
          # 检查关键文件是否在 main 分支存在
          for file in pom.xml src/main/java src/test/java; do
            if git show main:"$file" >/dev/null 2>&1; then
              echo "✅ $file 在 main 分支存在"
            else
              echo "❌ $file 在 main 分支不存在 (仅在 PR 分支新增)"
              INVALID_FILES=$((INVALID_FILES + 1))
            fi
          done

          # 检查所有新增的 Java 文件是否在 main 分支有历史
          echo ""
          echo "=== 检查 PR 中新增的文件 ==="
          NEW_JAVA_FILES=$(git diff --name-only main...HEAD -- '*.java' | while read file; do
            if ! git log --oneline main -- "$file" | head -1 >/dev/null 2>&1; then
              echo "$file"
            fi
          done)

          if [ -n "$NEW_JAVA_FILES" ]; then
            echo "以下文件在 main 分支中没有历史记录:"
            echo "$NEW_JAVA_FILES"
            INVALID_FILES=$((INVALID_FILES + $(echo "$NEW_JAVA_FILES" | wc -l)))
          fi

          if [ "$INVALID_FILES" -gt 0 ]; then
            echo ""
            echo "❌ 验证失败: $INVALID_FILES 个文件在 main 分支不存在"
            exit 1
          fi

      - name: Verify file history integrity
        run: |
          echo "=== 验证文件历史完整性 ==="
          # 使用 git log 检查关键文件的提交历史
          KEY_DIRS="src/main/java src/test/java"
          for dir in $KEY_DIRS; do
            if [ -d "$dir" ]; then
              FILE_COUNT=$(find "$dir" -name '*.java' 2>/dev/null | wc -l)
              if [ "$FILE_COUNT" -gt 0 ]; then
                # 检查这些文件是否在 main 分支有历史
                RECENT_COMMITS=$(git log --oneline main...HEAD -- "$dir" 2>/dev/null | wc -l)
                echo "目录 $dir: $FILE_COUNT 个 Java 文件, $RECENT_COMMITS 个提交涉及此目录"
              fi
            fi
          done

          echo ""
          echo "✅ 文件历史完整性检查完成"

      - name: Generate verification report
        if: always()
        run: |
          REPORT_FILE="verification-report-$(date +%Y%m%d-%H%M%S).txt"
          echo "=== 交付物验证报告 ===" > $REPORT_FILE
          echo "生成时间: $(date)" >> $REPORT_FILE
          echo "仓库: $GITHUB_REPOSITORY" >> $REPORT_FILE
          echo "提交: $GITHUB_SHA" >> $REPORT_FILE
          echo "分支: $GITHUB_REF" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "基础分支: main" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试文件:" >> $REPORT_FILE
          find src/test/java -name '*Test.java' 2>/dev/null >> $REPORT_FILE || echo "无" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "主源码文件:" >> $REPORT_FILE
          find src/main/java -name '*.java' 2>/dev/null >> $REPORT_FILE || echo "无" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "测试报告:" >> $REPORT_FILE
          ls -la target/surefire-reports/*.txt 2>/dev/null | head -20 >> $REPORT_FILE || echo "无测试报告" >> $REPORT_FILE
          echo "" >> $REPORT_FILE
          echo "main 分支文件验证:" >> $REPORT_FILE
          for file in pom.xml src/main/java src/test/java; do
            if git show main:"$file" >/dev/null 2>&1; then
              echo "  ✅ $file" >> $REPORT_FILE
            else
              echo "  ❌ $file" >> $REPORT_FILE
            fi
          done
          cat $REPORT_FILE

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: verification-report-*.txt
          retention-days: 30

  # Merge gate - prevents merge if checks fail (MIN-1545, MIN-2413)
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [merge-conflict-check, build, security, quality, semgrep-sast, trivy-scan, gitleaks-scan, verify-deliverables]
    steps:
      - name: Verify all checks passed
        run: |
          echo "=== Merge Gate Verification ==="
          echo "All required checks have passed."
          echo "This PR is cleared for merge."

  # Semgrep SAST scan
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
          output: semgrep.sarif
          upload: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Trivy vulnerability scan
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # Gitleaks secrets scan
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: 'detect --source . --exit-code 1'
          config: .gitleaks.toml

      - name: Upload Gitleaks results
        if: failure()
        run: |
          echo "Secrets detected! Gitleaks scan failed."
          exit 1
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Xmx1024m

jobs:
  # Code existence verification (MIN-1444)
  verify-code:
    name: Verify Code Existence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug working directory
        run: |
          echo "Working directory: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Listing all files in current directory:"
          ls -la

      - name: Verify source files exist
        run: |
          echo "=== Verifying Source Code Files ==="
          echo "Current directory: $(pwd)"
          test -d "$GITHUB_WORKSPACE/src/main/java" && echo "Main source directory exists" || echo "Main source directory MISSING"
          test -d "$GITHUB_WORKSPACE/src/test/java" && echo "Test source directory exists" || echo "Test source directory MISSING"
          test -f "$GITHUB_WORKSPACE/pom.xml" && echo "Maven configuration exists" || echo "Maven configuration MISSING"
          test -f "$GITHUB_WORKSPACE/backend/Dockerfile" && echo "Dockerfile exists" || echo "Dockerfile MISSING"

      - name: Count source files
        run: |
          echo "=== Source Code Statistics ==="
          echo "Java files: $(find src -name '*.java' 2>/dev/null | wc -l)"
          echo "Configuration files: $(find src -name '*.yml' -o -name '*.yaml' -o -name '*.properties' 2>/dev/null | wc -l)"

  # Build and test
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: verify-code
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Generate test report
        if: always()
        run: |
          echo "=== Test Results ==="
          if [ -f target/surefire-reports/*.txt ]; then
            cat target/surefire-reports/*.txt 2>/dev/null | head -50 || echo "No test reports found"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/*.jar
          retention-days: 7

  # Security scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run SpotBugs
        run: mvn spotbugs:check -B -q || echo "SpotBugs not configured, skipping"

      - name: Run dependency check
        run: |
          echo "=== Checking for known vulnerabilities ==="
          mvn dependency-check:check -B -q || echo "OWASP dependency check not configured"

  # Code quality check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Check code format
        run: |
          echo "=== Checking code formatting ==="
          TODO_COUNT=$(grep -r "TODO\|FIXME" src/main/java --include="*.java" 2>/dev/null | wc -l)
          echo "TODO/FIXME comments: $TODO_COUNT"
          if [ $TODO_COUNT -gt 10 ]; then
            echo "Warning: High number of TODO/FIXME comments found"
          fi

      - name: Count lines of code
        run: |
          echo "=== Code Statistics ==="
          echo "Main source lines: $(find src/main/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
          echo "Test source lines: $(find src/test/java -name '*.java' -exec cat {} \; 2>/dev/null | wc -l)"
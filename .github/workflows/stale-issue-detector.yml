name: Stale Issue Detector

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing
    inputs:
      threshold_sprints:
        description: 'Number of sprints threshold (default: 50)'
        required: false
        default: '50'
        type: string

env:
  JAVA_VERSION: '17'
  SPRINT_THRESHOLD: ${{ inputs.threshold_sprints || '50' }}

jobs:
  scan-stale-issues:
    name: Scan Stale Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== Stale Issue Detector ==="
          echo "Scheduled scan triggered at $(date)"
          echo "Sprint threshold: ${{ env.SPRINT_THRESHOLD }}"

      - name: Check if scan script exists
        id: check-script
        run: |
          if [ -f "scripts/scan-stale-issues.sh" ]; then
            echo "Script found: scripts/scan-stale-issues.sh"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Script not found: scripts/scan-stale-issues.sh"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Make script executable
        if: steps.check-script.outputs.exists == 'true'
        run: chmod +x scripts/scan-stale-issues.sh

      - name: Run stale issue scan
        if: steps.check-script.outputs.exists == 'true'
        id: scan
        run: |
          echo "=== Running Stale Issue Scan ==="

          # Run the scan script with JSON output
          SCAN_OUTPUT=$(./scripts/scan-stale-issues.sh --json 2>&1)
          SCAN_EXIT_CODE=$?

          echo "$SCAN_OUTPUT"
          echo ""

          # Save output for later steps
          echo "$SCAN_OUTPUT" > stale-scan-output.json

          # Extract key metrics
          if [ -f stale-scan-output.json ] && command -v jq &> /dev/null; then
            STALE_COUNT=$(jq -r '.summary.stale_issues // 0' stale-scan-output.json 2>/dev/null || echo "0")
            TOTAL_COUNT=$(jq -r '.summary.total_backlog_issues // 0' stale-scan-output.json 2>/dev/null || echo "0")
            STALE_PERCENTAGE=$(jq -r '.summary.stale_percentage // 0' stale-scan-output.json 2>/dev/null || echo "0")

            echo "STALE_COUNT=$STALE_COUNT" >> $GITHUB_ENV
            echo "TOTAL_COUNT=$TOTAL_COUNT" >> $GITHUB_ENV
            echo "STALE_PERCENTAGE=$STALE_PERCENTAGE" >> $GITHUB_ENV

            echo "Scan results: $STALE_COUNT stale issues out of $TOTAL_COUNT total ($STALE_PERCENTAGE%)"
          fi

      - name: Upload scan results
        if: steps.check-script.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stale-issue-scan-results
          path: stale-scan-output.json
          retention-days: 30

      - name: Create issue report if stale issues found
        if: steps.check-script.outputs.exists == 'true' && env.STALE_COUNT != '0'
        run: |
          echo "=== Creating Issue Report ==="

          # Create a detailed report comment
          REPORT_CONTENT="## Stale Issue Detection Report

**Scan Date:** $(date '+%Y-%m-%d %H:%M:%S UTC')
**Sprint Threshold:** ${{ env.SPRINT_THRESHOLD }}

### Summary
- Total backlog issues: ${{ env.TOTAL_COUNT }}
- Stale issues (> ${{ env.SPRINT_THRESHOLD }} sprints): ${{ env.STALE_COUNT }}
- Stale percentage: ${{ env.STALE_PERCENTAGE }}%

### Action Required
Please review the following stale issues and either:
1. Close them if they're no longer relevant
2. Prioritize them for upcoming sprints
3. Update their status if they're still active

This is an automated report generated by the Stale Issue Detector workflow."

          echo "$REPORT_CONTENT"

          # Note: In a real implementation, you would use the GitHub API to create an issue
          # For now, we output the report content
          echo "$REPORT_CONTENT" > stale-issue-report.md

      - name: Upload issue report
        if: steps.check-script.outputs.exists == 'true' && env.STALE_COUNT != '0'
        uses: actions/upload-artifact@v4
        with:
          name: stale-issue-report
          path: stale-issue-report.md
          retention-days: 30

      - name: Check for script
        if: steps.check-script.outputs.exists == 'false'
        run: |
          echo "=== Warning: Scan Script Not Found ==="
          echo "The scripts/scan-stale-issues.sh file does not exist in this repository."
          echo "Please create the stale issue detection script to enable automated scanning."
          echo ""
          echo "Required script path: scripts/scan-stale-issues.sh"
          exit 1

  # Summary job - runs after scan
  report:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: scan-stale-issues
    if: always()
    steps:
      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: stale-issue-scan-results
          path: .
        continue-on-error: true

      - name: Generate summary
        run: |
          echo "=== Stale Issue Detection Summary ==="
          echo "Scan completed at $(date)"
          echo ""

          if [ -f stale-scan-output.json ] && command -v jq &> /dev/null; then
            STALE_COUNT=$(jq -r '.summary.stale_issues // 0' stale-scan-output.json 2>/dev/null || echo "0")
            TOTAL_COUNT=$(jq -r '.summary.total_backlog_issues // 0' stale-scan-output.json 2>/dev/null || echo "0")

            echo "Results:"
            echo "  - Total backlog issues: $TOTAL_COUNT"
            echo "  - Stale issues: $STALE_COUNT"

            if [ "$STALE_COUNT" -gt 0 ]; then
              echo ""
              echo "Stale issues require attention!"
              echo "Review the scan results and take appropriate action."
            else
              echo ""
              echo "All backlog issues are recent. No action required."
            fi
          else
            echo "Could not parse scan results"
            cat stale-scan-output.json 2>/dev/null || echo "File not available"
          fi
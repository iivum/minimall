name: Bug Report
description: Report a bug in the Minimall project
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the bug:
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
  - type: input
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
  - type: input
    id: environment
    attributes:
      label: Environment
      description: |
        - Java version:
        - OS:
        - Database:
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Add any relevant log output

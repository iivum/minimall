[gitleaks]
version = "8"

[allowlist]
description = "Allowlisted files and patterns"
files = [
  "(.*/)?vendor/.*",
  "(.*/)?node_modules/.*",
  "(.*/)?target/.*",
  "**/*.lock",
  "**/package-lock.json",
]

[allowlist]
description = "Allowlisted secrets for testing"
regexes = [
  "(?i)-----BEGIN RSA PRIVATE KEY-----", # Test keys
  "(?i)-----BEGIN EC PRIVATE KEY-----",
]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["key", "AWS"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws_secret_access_key\s*[:=]\s*['"]?[A-Za-z0-9/+=]{40}['"]?'''
tags = ["key", "AWS"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?token)\s*[:=]\s*['"]?[A-Za-z0-9]{16,64}['"]?'''
tags = ["key", "API"]

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,251}'''
tags = ["key", "GitHub"]

[[rules]]
id = "gitlab-token"
description = "GitLab Personal Access Token"
regex = '''glpat-[0-9a-zA-Z\\-]{20}'''
tags = ["key", "GitLab"]

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''
tags = ["key", "Slack"]

[[rules]]
id = "jwt-token"
description = "JSON Web Token"
regex = '''eyJ[A-Za-z0-9_=-]+\.eyJ[A-Za-z0-9_=-]+'''
tags = ["key", "JWT"]

[[rules]]
id = "private-key"
description = "Generic Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'''
tags = ["key", "PEM"]

[[rules]]
id = "database-url"
description = "Database Connection String"
regex = '''(?i)(mysql|postgres|postgres|redis|mongodb)://[a-zA-Z0-9]+:[^@]+@'''
tags = ["key", "database"]
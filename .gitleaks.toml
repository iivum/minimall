[version]
max-target-mb = 10

[rules]
  [[rules.allowlist]]
    description = "Allowlisted AWS keys for testing"
    matchSings = [
      "AKIAIOSFODNN7EXAMPLE",
      "AKIAIOSFODNN7EXAMPLE"
    ]

  # Exclude common false positives
  [[rules.allowlist.files]]
    regex = ".*\\.min\\.js$"

  [[rules.allowlist.files]]
    regex = ".*/test/.+$"

  [[rules.allowlist.files]]
    regex = ".*/node_modules/.+$"

  [[rules.allowlist.files]]
    regex = ".*/target/.+$"

  [[rules.allowlist.files]]
    regex = "^\\.git/.*"

# Entropy-based secrets detection
[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
  tags = ["key", "AWS"]

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Access Key"
  regex = '''(?i)aws_secret_access_key\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{40}['\"]?'''
  tags = ["key", "AWS"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey|api[_-]?token)\s*[:=]\s*['\"]?[A-Za-z0-9]{16,64}['\"]?'''
  tags = ["key", "API"]

[[rules]]
  id = "generic-secret"
  description = "Generic Secret"
  regex = '''(?i)(secret|password|passwd|pwd|token)\s*[:=]\s*['\"]?[A-Za-z0-9!@#$%^&*=]{8,64}['\"]?'''
  tags = ["secret"]

[[rules]]
  id = "github-token"
  description = "GitHub Token"
  regex = '''gh[pousr]_[A-Za-z0-9_]{36,255}'''
  tags = ["key", "GitHub"]

[[rules]]
  id = "gitlab-token"
  description = "GitLab Token"
  regex = '''glpat-[0-9a-zA-Z\\-]{20}'''
  tags = ["key", "GitLab"]

[[rules]]
  id = "slack-token"
  description = "Slack Token"
  regex = '''xox[baprs]-[0-9a-zA-Z]{10,48}'''
  tags = ["key", "Slack"]

[[rules]]
  id = "stripe-key"
  description = "Stripe API Key"
  regex = '''sk_live_[0-9a-zA-Z]{24}'''
  tags = ["key", "Stripe"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
  tags = ["key"]

[[rules]]
  id = "jwt-token"
  description = "JWT Token"
  regex = '''eyJ[A-Za-z0-9_=-]+\.eyJ[A-Za-z0-9_=-]+\.[A-Za-z0-9_=-]+'''
  tags = ["token", "JWT"]

[[rules]]
  id = "_connection-string"
  description = "Database Connection String"
  regex = '''(?i)(mongodb|mysql|postgresql|redis|sqlserver):\/\/[^\s]+'''
  tags = ["database", "connection"]

[[rules]]
  id = "wechat-pay-key"
  description = "WeChat Pay API Key"
  regex = '''(?i)wechatpay[_-]?key\s*[:=]\s*['\"]?[A-Za-z0-9]{16,64}['\"]?'''
  tags = ["key", "Payment", "WeChat"]

[[rules]]
  id = "alipay-key"
  description = "Alipay API Key"
  regex = '''(?i)alipay[_-]?key\s*[:=]\s*['\"]?[A-Za-z0-9]{16,64}['\"]?'''
  tags = ["key", "Payment", "Alipay"]
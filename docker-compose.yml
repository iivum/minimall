version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: minimall-postgres
    environment:
      POSTGRES_DB: minimall
      POSTGRES_USER: minimall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minimall123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimall"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - minimall-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minimall-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minimall
      SPRING_DATASOURCE_USERNAME: minimall
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-minimall123}
      SERVER_PORT: 8080
      WECHATPAY_MCHID: ${WECHATPAY_MCHID}
      WECHATPAY_SERIAL_NO: ${WECHATPAY_SERIAL_NO}
      WECHATPAY_PRIVATE_KEY_PATH: classpath:cert/apiclient_key.pem
      WECHATPAY_API_V3_KEY: ${WECHATPAY_API_V3_KEY}
      WECHATPAY_CALLBACK_URL: ${WECHATPAY_CALLBACK_URL}
      WECHATPAY_SANDBOX: ${WECHATPAY_SANDBOX:-false}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - minimall-network

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: minimall-prometheus
    volumes:
      - ./docs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/monitoring/alertmanager-rules.yml:/etc/prometheus/alertmanager-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - minimall-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: minimall-grafana
    volumes:
      - ./docs/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/minimall.json:ro
      - ./docs/monitoring/provisioning.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - minimall-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: minimall-alertmanager
    volumes:
      - ./docs/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - minimall-network

networks:
  minimall-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
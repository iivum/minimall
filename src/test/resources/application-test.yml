spring:
  application:
    name: minimall
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: MinIMallHikariCP-Test
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: 8080

logging:
  level:
    com.minimall: INFO
    org.springframework.security: INFO

jwt:
  secret: TEST_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG_FOR_TESTING
  expiration-ms: 86400000

wechatpay:
  appid: test-appid
  mchid: test-mchid
  serialNo: test-serial-no
  privateKeyPath: classpath:cert/apiclient_key.pem
  apiV3Key: test-api-v3-key
  callbackUrl: https://test-domain.com/api/pay/callback
  sandbox: true

resilience4j:
  circuitbreaker:
    instances:
      WeChatApi:
        register-health-indicator: true
        sliding-window-size: 10
        sliding-window-type: count
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
  timelimiter:
    instances:
      WeChatApi:
        timeout-duration: 10s
        cancel-running-future: true
  retry:
    instances:
      WeChatApi:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
spring.application.name=minimall
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
server.port=8080
logging.level.com.minimall=INFO
logging.level.org.springframework.security=INFO
jwt.secret=TEST_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG_FOR_TESTING
jwt.expiration-ms=86400000
wechatpay.appid=test-appid
wechatpay.mchid=test-mchid
wechatpay.serialNo=test-serial-no
wechatpay.privateKeyPath=classpath:apiclient_key.pem
wechatpay.apiV3Key=test-api-v3-key
wechatpay.callbackUrl=https://test-domain.com/api/pay/callback
wechatpay.sandbox=true
customer-service.auto-reply.enabled=true
customer-service.auto-reply.rules.refund=refund message
customer-service.auto-reply.rules.logistics=logistics message
management.metrics.enable=false
spring.main.allow-bean-definition-overriding=true
spring.application.name=minimall

# H2 Database for development
spring.datasource.url=jdbc:h2:mem:minimall;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# HikariCP Development Configuration
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.pool-name=MinIMallHikariCP-Dev

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=8080

# Logging
logging.level.com.minimall=INFO
logging.level.org.springframework.security=INFO

# JWT
jwt.secret=YOUR_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG
jwt.expiration-ms=86400000

# WeChat Pay Configuration
wechatpay.appid=YOUR_APPID
wechatpay.mchid=YOUR_MCHID
wechatpay.serialNo=YOUR_SERIAL_NO
wechatpay.privateKeyPath=classpath:cert/apiclient_key.pem
wechatpay.apiV3Key=YOUR_API_V3_KEY
wechatpay.callbackUrl=https://your-domain.com/api/pay/callback
wechatpay.sandbox=true
# WeChat Subscription Message Configuration
wechat.subscribe.appId=YOUR_APPID
wechat.subscribe.appSecret=YOUR_APP_SECRET
wechat.subscribe.orderCreatedTemplateId=YOUR_TEMPLATE_ID_1
wechat.subscribe.orderPaidTemplateId=YOUR_TEMPLATE_ID_2
wechat.subscribe.orderShippedTemplateId=YOUR_TEMPLATE_ID_3
wechat.subscribe.orderCompletedTemplateId=YOUR_TEMPLATE_ID_4

# Resilience4j Circuit Breaker for WeChat API
resilience4j.circuitbreaker.instances.WeChatApi.register-health-indicator=true
resilience4j.circuitbreaker.instances.WeChatApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.WeChatApi.sliding-window-type=count
resilience4j.circuitbreaker.instances.WeChatApi.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.WeChatApi.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.WeChatApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.WeChatApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.WeChatApi.event-consumer-buffer-size=10
resilience4j.timelimiter.instances.WeChatApi.timeout-duration=10s
resilience4j.timelimiter.instances.WeChatApi.cancel-running-future=true
resilience4j.retry.instances.WeChatApi.max-attempts=3
resilience4j.retry.instances.WeChatApi.wait-duration=500ms
resilience4j.retry.instances.WeChatApi.enable-exponential-backoff=true
resilience4j.retry.instances.WeChatApi.exponential-backoff-multiplier=2

# Customer Service Auto-Reply Configuration
customer-service.auto-reply.enabled=true
customer-service.auto-reply.rules.退货=亲，退款请在订单详情页申请哦~
customer-service.auto-reply.rules.退款=亲，退款申请已受理，1-3个工作日到账哦~
customer-service.auto-reply.rules.物流=请提供订单号，小二帮您查询~
customer-service.auto-reply.rules.优惠=当前暂无优惠活动，关注公众号获取最新资讯~
customer-service.auto-reply.rules.发票=发票申请请在订单完成后联系客服办理~

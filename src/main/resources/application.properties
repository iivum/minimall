spring.application.name=minimall

# H2 Database for development
spring.datasource.url=jdbc:h2:mem:minimall;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis (placeholder for production)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator & Metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=8080

# Logging
logging.level.com.minimall=INFO
logging.level.org.springframework.security=INFO

# JWT
jwt.secret=YOUR_JWT_SECRET_KEY_AT_LEAST_32_CHARS_LONG
jwt.expiration-ms=86400000

# WeChat Pay Configuration
wechatpay.appid=YOUR_APPID
wechatpay.mchid=YOUR_MCHID
wechatpay.serialNo=YOUR_SERIAL_NO
wechatpay.privateKeyPath=classpath:cert/apiclient_key.pem
wechatpay.apiV3Key=YOUR_API_V3_KEY
wechatpay.callbackUrl=https://your-domain.com/api/pay/callback
wechatpay.sandbox=true
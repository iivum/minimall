spring.application.name=minimall

# Production PostgreSQL Database
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_URL:postgres:5432/minimall}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:minimall}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:minimall123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=${SERVER_PORT:8080}

# Logging
logging.level.com.minimall=INFO
logging.level.org.springframework.security=INFO

# WeChat Pay Configuration
wechatpay.mchid=${WECHATPAY_MCHID}
wechatpay.serialNo=${WECHATPAY_SERIAL_NO}
wechatpay.privateKeyPath=${WECHATPAY_PRIVATE_KEY_PATH:classpath:cert/apiclient_key.pem}
wechatpay.apiV3Key=${WECHATPAY_API_V3_KEY}
wechatpay.callbackUrl=${WECHATPAY_CALLBACK_URL}
wechatpay.sandbox=${WECHATPAY_SANDBOX:false}
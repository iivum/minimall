version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: minimall-postgres
    environment:
      POSTGRES_DB: minimall
      POSTGRES_USER: minimall
      POSTGRES_PASSWORD: minimall123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimall"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
